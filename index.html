<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majaribio ya App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            padding-top: 50px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>🚀 Safari Imeanza!</h1>
    <p>Hii ni app yetu ya kwanza ya majaribio kupitia Acode na Termux.</p>
    
    <button onclick="salamu()">Bonyeza Hapa</button>

    <script>
        function salamu() {
            alert("Hongera Muslimu! Mifumo yako inafanya kazi vizuri sana. Sasa tuko tayari kwa Nova!");
        }
    </script>
</body>
</html>
